name: Build & Release APK (Windows Local)

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch o commit da buildare'
        required: false
        default: 'main'
      version_override:
        description: 'Tag release (es. v2.7.7). Vuoto = legge app.json'
        required: false
        default: ''

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    runs-on: [self-hosted, Windows, X64, aerostaff]
    timeout-minutes: 45
    env:
      RELEASE_STORE_FILE: ${{ github.workspace }}\android\app\release.keystore
      RELEASE_STORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
      RELEASE_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
      RELEASE_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

    steps:
      - name: Compute checkout ref
        id: co
        shell: pwsh
        run: |
          $inputRef = '${{ github.event.inputs.ref }}'
          if (-not [string]::IsNullOrWhiteSpace($inputRef)) {
            "ref=$inputRef" >> $env:GITHUB_OUTPUT
          } else {
            "ref=main" >> $env:GITHUB_OUTPUT
          }

      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ steps.co.outputs.ref }}

      - name: Compute checked out source commit
        id: source
        shell: pwsh
        run: |
          $sha = git rev-parse HEAD
          "sha=$sha" >> $env:GITHUB_OUTPUT

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Resolve Android SDK
        shell: pwsh
        run: |
          $sdk = $env:ANDROID_HOME
          if ([string]::IsNullOrWhiteSpace($sdk)) {
            $sdk = $env:ANDROID_SDK_ROOT
          }
          if ([string]::IsNullOrWhiteSpace($sdk)) {
            $sdk = Join-Path $env:LOCALAPPDATA 'Android\Sdk'
          }

          $required = @(
            (Join-Path $sdk 'platforms\android-37'),
            (Join-Path $sdk 'build-tools\37.0.0'),
            (Join-Path $sdk 'ndk\27.1.12297006'),
            (Join-Path $sdk 'cmake\3.22.1')
          )
          foreach ($path in $required) {
            if (-not (Test-Path -LiteralPath $path)) {
              throw "Missing Android SDK component: $path"
            }
          }

          "ANDROID_HOME=$sdk" >> $env:GITHUB_ENV
          "ANDROID_SDK_ROOT=$sdk" >> $env:GITHUB_ENV

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Fix expo-modules-core Gradle bugs
        shell: pwsh
        run: |
          $file = 'node_modules/expo-modules-core/android/build.gradle'
          $text = Get-Content -LiteralPath $file -Raw
          if ($text -notmatch 'def _coreFeatures = project\.findProperty') {
            $text = $text.Replace(
              "apply plugin: 'com.android.library'",
              "// Fix: project-level re-declaration`r`ndef _coreFeatures = project.findProperty(`"coreFeatures`") ?: []`r`next.shouldIncludeCompose = _coreFeatures.contains(`"compose`")`r`n`r`napply plugin: 'com.android.library'"
            )
          }
          $text = $text -replace '(?m)^\s*compose shouldIncludeCompose\s*$', '    compose = shouldIncludeCompose'
          Set-Content -LiteralPath $file -Value $text -NoNewline

      - name: Compute release tag
        id: meta
        shell: pwsh
        run: |
          $version = node -p "require('./app.json').expo.version"
          $override = '${{ github.event.inputs.version_override }}'
          if (-not [string]::IsNullOrWhiteSpace($override)) {
            $tag = $override
          } else {
            $tag = "v$version"
          }
          "version=$version" >> $env:GITHUB_OUTPUT
          "tag=$tag" >> $env:GITHUB_OUTPUT

      - name: Restore release keystore
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace('${{ secrets.KEYSTORE_BASE64 }}')) {
            throw 'Missing KEYSTORE_BASE64 secret'
          }
          foreach ($name in @('RELEASE_STORE_PASSWORD', 'RELEASE_KEY_ALIAS', 'RELEASE_KEY_PASSWORD')) {
            if ([string]::IsNullOrWhiteSpace([Environment]::GetEnvironmentVariable($name))) {
              throw "Missing $name secret"
            }
          }
          New-Item -ItemType Directory -Force -Path 'android/app' | Out-Null
          [IO.File]::WriteAllBytes($env:RELEASE_STORE_FILE, [Convert]::FromBase64String('${{ secrets.KEYSTORE_BASE64 }}'))

      - name: Build release APK
        shell: pwsh
        run: |
          cd android
          .\gradlew.bat :app:assembleRelease --no-daemon -Pandroid.overridePathCheck=true
        env:
          GRADLE_OPTS: "-Xmx4g -XX:MaxMetaspaceSize=512m"

      - name: Validate APK release metadata
        shell: pwsh
        run: |
          $apk = Get-ChildItem -Path 'android/app/build/outputs/apk/release' -Filter '*.apk' -Recurse | Select-Object -First 1
          if (-not $apk) {
            throw 'No release APK found'
          }

          $aapt = Join-Path $env:ANDROID_HOME 'build-tools\37.0.0\aapt.exe'
          $badging = & $aapt dump badging $apk.FullName
          $packageLine = ($badging | Select-String -Pattern "^package:").Line
          if ($packageLine -notmatch "versionCode='([^']+)'.*versionName='([^']+)'") {
            throw 'Could not parse APK badging output'
          }

          $apkVersionCode = $Matches[1]
          $apkVersionName = $Matches[2]
          $expectedTag = "v$apkVersionName"

          Write-Host "APK versionName=$apkVersionName"
          Write-Host "APK versionCode=$apkVersionCode"
          Write-Host "Release tag=${{ steps.meta.outputs.tag }}"

          if ('${{ steps.meta.outputs.version }}' -ne $apkVersionName) {
            throw "app.json version (${{ steps.meta.outputs.version }}) does not match APK versionName ($apkVersionName)"
          }
          if ('${{ steps.meta.outputs.tag }}' -ne $expectedTag) {
            throw "Release tag (${{ steps.meta.outputs.tag }}) does not match APK versionName ($apkVersionName)"
          }

      - name: Rename APK
        shell: pwsh
        run: |
          $apk = Get-ChildItem -Path 'android/app/build/outputs/apk/release' -Filter '*.apk' -Recurse | Select-Object -First 1
          if (-not $apk) {
            throw 'No release APK found'
          }
          $dest = 'AeroStaffPro-${{ steps.meta.outputs.tag }}.apk'
          Copy-Item -LiteralPath $apk.FullName -Destination $dest -Force
          "apk=$dest" >> $env:GITHUB_ENV

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: "AeroStaff Pro ${{ steps.meta.outputs.tag }}"
          target_commitish: ${{ steps.source.outputs.sha }}
          generate_release_notes: true
          files: ${{ env.apk }}
          draft: false
          prerelease: false
